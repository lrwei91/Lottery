name: Auto Update World Cup Matches

on:
  workflow_dispatch:
  schedule:
    - cron: '12 19 * * *'

permissions:
  contents: write

jobs:
  update-worldcup-matches:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch FIFA match schedule
        run: python3 scripts/sync_worldcup_matches.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain data/worldcup_matches.json)" ]; then
            git add data/worldcup_matches.json
            git commit \
              -m "Keep World Cup match data current" \
              -m "Refresh the static match snapshot from FIFA's public calendar API so GitHub Pages can show current group-stage fixtures without a runtime backend.

Constraint: The web app is static and cannot call protected or server-side APIs at runtime
Confidence: high
Scope-risk: narrow
Tested: python3 scripts/sync_worldcup_matches.py
Not-tested: Browser rendering in scheduled workflow"
            git push
          else
            echo "No World Cup match changes detected."
          fi
