name: Auto Update Lottery Data

on:
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 授予写入权限以允许工作流向仓库推送数据

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      JISU_API_KEY: ${{ secrets.JISU_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch DLT Data
        run: node scripts/scraper.js

      - name: Fetch PL3 Data
        run: node scripts/scraper_pl3.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查数据是否发生了变更
          git status
          
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "数据发生更新，正在提交并推送..."
            git add data/
            git commit -m "Auto update lottery data: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "没有检测到数据变化，跳过提交。"
          fi
